apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-tls-app
spec:
  template:
    metadata:
      annotations:
        vault.hashicorp.com/role: "${VAULT_ROLE}"
        rollout-trigger: "${ROLLOUT_TRIGGER}"
        vault.hashicorp.com/agent-inject-template-tls.crt: |
          {{- with secret "${VAULT_SECRET_PATH}" -}}
          {{ .Data.data.tls.crt }}
          {{- end }}
        vault.hashicorp.com/agent-inject-template-tls.key: |
          {{- with secret "${VAULT_SECRET_PATH}" -}}
          {{ .Data.data.tls.key }}
          {{- end }}
        vault.hashicorp.com/agent-inject-template-ca.crt: |
          {{- with secret "${VAULT_SECRET_PATH}" -}}
          {{ .Data.data.ca.crt }}
          {{- end }}
